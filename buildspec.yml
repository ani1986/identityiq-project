version: 0.2

phases:

  install:
    runtime-versions:
      java: corretto11
    commands:
      - echo "Installing base tools"
      - yum install -y unzip zip dos2unix tar gzip
      - echo "Checking curl"
      - curl --version
      - echo "Downloading Apache Ant binary distribution"
      - curl -L -o /tmp/apache-ant.tar.gz https://archive.apache.org/dist/ant/binaries/apache-ant-1.10.14-bin.tar.gz
      - mkdir -p /opt
      - tar -xzf /tmp/apache-ant.tar.gz -C /opt
      - export ANT_HOME=/opt/apache-ant-1.10.14
      - export PATH=$ANT_HOME/bin:$PATH
      - mkdir -p $ANT_HOME/lib
      - echo "Downloading BeanShell + BSF jars"
      - curl -L -o $ANT_HOME/lib/bsh-2.0b6.jar https://repo1.maven.org/maven2/org/beanshell/bsh/2.0b6/bsh-2.0b6.jar
      - curl -L -o $ANT_HOME/lib/bsf-2.4.0.jar https://repo1.maven.org/maven2/bsf/bsf/2.4.0/bsf-2.4.0.jar
      - curl -L -o $ANT_HOME/lib/commons-logging-1.2.jar https://repo1.maven.org/maven2/commons-logging/commons-logging/1.2/commons-logging-1.2.jar
      - echo "ANT_HOME=$ANT_HOME"
      - which ant
      - ant -version

  pre_build:
    commands:
      - echo "Preparing IdentityIQ build"
      - chmod +x build.sh
      - echo "Downloading IdentityIQ GA package"
      - aws s3 cp s3://download-local/identityiq-8.5.zip base/ga/
      - ls -l base/ga

  build:
    commands:
      - echo "Normalizing line endings"
      - echo "Normalizing line endings"
      - dos2unix appspec.yml || true
      - dos2unix scripts/*.sh || true
      - chmod +x scripts/*.sh

      - echo "===== VERIFY deploy_war.sh being packaged ====="
      - cat -n scripts/deploy_war.sh
      - sha256sum scripts/deploy_war.sh

      - echo "Running IdentityIQ build"
      - export ANT_HOME=/opt/apache-ant-1.10.14
      - export PATH=$ANT_HOME/bin:$PATH
      - export SPTARGET=dev
      - ./build.sh clean war

      # WAR EXISTS FROM HERE ON

      - echo "===== VERIFY identityiq.war exists ====="
      - ls -lh build/deploy/identityiq.war

      - echo "===== LIST WAR CONTENTS (TOP) ====="
      - jar tf build/deploy/identityiq.war | head

      - echo "===== VERIFY Application-Hrms.xml IN WAR ====="
      - jar tf build/deploy/identityiq.war | grep -q "WEB-INF/config/custom/Application/Application-Hrms.xml" && echo " Application-Hrms.xml FOUND in WAR" || (echo " Application-Hrms.xml NOT FOUND in WAR" && exit 1)

      - echo "===== DUMP Application-Hrms.xml FROM WAR ====="
      - jar xf build/deploy/identityiq.war WEB-INF/config/custom/Application/Application-Hrms.xml
      - cat WEB-INF/config/custom/Application/Application-Hrms.xml

      - echo "===== LIST DEPLOY ARTIFACTS ====="
      - ls -l build/deploy

artifacts:
  files:
    - appspec.yml
    - scripts/**/*
    - iiq-selenium-ant/**/*
    - build/deploy/**/*
